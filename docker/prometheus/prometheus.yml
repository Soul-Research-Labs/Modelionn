# Modelionn Prometheus scrape configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "modelionn"
    static_configs:
      - targets: ["registry:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s

  - job_name: "nvidia-gpu"
    static_configs:
      - targets: ["gpu-exporter:9835"]
    scrape_interval: 15s
