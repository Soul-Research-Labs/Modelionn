# ZKML Prometheus alert rules — ZK Prover Network

groups:
  - name: zkml_alerts
    rules:
      - alert: ProofTimeoutSpikeRate
        expr: >
          rate(zkml_proof_jobs_timed_out_total[15m]) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Proof job timeout rate spike"
          description: "More than 10% of proof jobs are timing out in the last 15 minutes."

      - alert: HighProofDispatchFailureRate
        expr: >
          rate(zkml_proof_dispatch_failures_total[5m]) /
          rate(zkml_proof_dispatch_total[5m]) > 0.2
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Proof dispatch failure rate exceeds 20%"
          description: "A significant portion of proof dispatch tasks are failing."

      - alert: NoOnlineProvers
        expr: zkml_provers_online == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No online provers in the network"
          description: "All GPU provers are offline — proof generation will fail."

      - alert: LowProverCount
        expr: zkml_provers_online < 3
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Online prover count is low"
          description: "Fewer than 3 provers are online — reduced redundancy and throughput."

      - alert: MetricsEndpointDown
        expr: up{job="zkml"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ZKML metrics endpoint is down"
          description: "Cannot scrape metrics from the ZKML registry."

      - alert: HighAPIKeyRejectionRate
        expr: >
          rate(zkml_api_key_rejections_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API key rejection rate"
          description: "More than 10 API key rejections per second — possible credential stuffing."

      - alert: NonceReplayAttack
        expr: >
          increase(zkml_nonce_replays_blocked_total[5m]) > 50
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Nonce replay attack detected"
          description: "Excessive nonce replay attempts blocked — possible replay attack in progress."

      - alert: IPFSUnreachable
        expr: zkml_ipfs_reachable == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "IPFS node unreachable"
          description: "The IPFS storage backend is not responding — circuit uploads and proof storage will fail."

      - alert: HighPartitionOrphanRate
        expr: >
          increase(zkml_partitions_reassigned_total[30m]) > 20
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High partition orphan/reassignment rate"
          description: "Many partitions are being reassigned due to prover failures."

      - alert: HighProofQueueDepth
        expr: zkml_proof_jobs_queued > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Proof job queue depth is high"
          description: "More than 100 proof jobs are queued — possibly insufficient prover capacity."

      - alert: DBPoolSaturation
        expr: >
          zkml_db_pool_checked_out /
          zkml_db_pool_size > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near saturation"
          description: "More than 85% of DB pool connections are checked out — increase pool size or investigate long-running queries."

      - alert: DBPoolExhausted
        expr: zkml_db_pool_overflow > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool exhausted (overflow in use)"
          description: "All pool connections are in use and overflow connections have been created."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 80%"
          description: "Redis is approaching its memory limit — consider evicting keys or scaling."

      - alert: RedisMemoryCritical
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis memory usage above 95%"
          description: "Redis is nearly out of memory — OOM kills are imminent."

      - alert: CeleryWorkerStalled
        expr: >
          time() - celery_worker_last_heartbeat_timestamp > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Celery worker has not sent a heartbeat in 5 minutes"
          description: "A Celery worker appears stalled or deadlocked — check for blocking tasks."

      - alert: CeleryTaskBacklog
        expr: celery_active_tasks + celery_reserved_tasks > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Celery task backlog growing"
          description: "More than 500 tasks are active or reserved — workers may be overloaded."

      - alert: GPUTemperatureHigh
        expr: nvidia_gpu_temperature_celsius > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU temperature above 85°C"
          description: "GPU {{ $labels.gpu }} on {{ $labels.instance }} is running hot — risk of thermal throttling."

      - alert: GPUUtilizationLow
        expr: nvidia_gpu_utilization_percent < 10 and zkml_proof_jobs_queued > 5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "GPU underutilized while jobs are queued"
          description: "GPU {{ $labels.gpu }} is idle despite proof job backlog — check prover assignment."

      - alert: ProofP99LatencyHigh
        expr: >
          histogram_quantile(0.99, rate(zkml_proof_latency_seconds_bucket[10m])) > 300
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "P99 proof generation latency exceeds 5 minutes"
          description: "The 99th percentile proof generation time is above 300 seconds."

      - alert: CeleryWorkerDown
        expr: celery_workers_online == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No Celery workers online"
          description: "All Celery workers are offline — proof dispatch and aggregation tasks will not be processed."
