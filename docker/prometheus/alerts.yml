# Modelionn Prometheus alert rules — ZK Prover Network

groups:
  - name: modelionn_alerts
    rules:
      - alert: ProofTimeoutSpikeRate
        expr: >
          rate(modelionn_proof_jobs_timed_out_total[15m]) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Proof job timeout rate spike"
          description: "More than 10% of proof jobs are timing out in the last 15 minutes."

      - alert: HighProofDispatchFailureRate
        expr: >
          rate(modelionn_proof_dispatch_failures_total[5m]) /
          rate(modelionn_proof_dispatch_total[5m]) > 0.2
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Proof dispatch failure rate exceeds 20%"
          description: "A significant portion of proof dispatch tasks are failing."

      - alert: NoOnlineProvers
        expr: modelionn_provers_online == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No online provers in the network"
          description: "All GPU provers are offline — proof generation will fail."

      - alert: LowProverCount
        expr: modelionn_provers_online < 3
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Online prover count is low"
          description: "Fewer than 3 provers are online — reduced redundancy and throughput."

      - alert: MetricsEndpointDown
        expr: up{job="modelionn"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Modelionn metrics endpoint is down"
          description: "Cannot scrape metrics from the Modelionn registry."

      - alert: HighAPIKeyRejectionRate
        expr: >
          rate(modelionn_api_key_rejections_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API key rejection rate"
          description: "More than 10 API key rejections per second — possible credential stuffing."

      - alert: NonceReplayAttack
        expr: >
          increase(modelionn_nonce_replays_blocked_total[5m]) > 50
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Nonce replay attack detected"
          description: "Excessive nonce replay attempts blocked — possible replay attack in progress."

      - alert: IPFSUnreachable
        expr: modelionn_ipfs_reachable == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "IPFS node unreachable"
          description: "The IPFS storage backend is not responding — circuit uploads and proof storage will fail."

      - alert: HighPartitionOrphanRate
        expr: >
          increase(modelionn_partitions_reassigned_total[30m]) > 20
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High partition orphan/reassignment rate"
          description: "Many partitions are being reassigned due to prover failures."
