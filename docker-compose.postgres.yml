# PostgreSQL override — use with: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zkml
      POSTGRES_USER: zkml
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zkml_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zkml"]
      interval: 10s
      timeout: 5s
      retries: 3

  registry:
    environment:
      - ZKML_DATABASE_URL=postgresql+asyncpg://zkml:${POSTGRES_PASSWORD:-zkml_dev}@postgres:5432/zkml
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    environment:
      - ZKML_DATABASE_URL=postgresql+asyncpg://zkml:${POSTGRES_PASSWORD:-zkml_dev}@postgres:5432/zkml
    depends_on:
      postgres:
        condition: service_healthy
