# PostgreSQL override — use with: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: modelionn
      POSTGRES_USER: modelionn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-modelionn_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelionn"]
      interval: 10s
      timeout: 5s
      retries: 3

  registry:
    environment:
      - MODELIONN_DATABASE_URL=postgresql+asyncpg://modelionn:${POSTGRES_PASSWORD:-modelionn_dev}@postgres:5432/modelionn
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    environment:
      - MODELIONN_DATABASE_URL=postgresql+asyncpg://modelionn:${POSTGRES_PASSWORD:-modelionn_dev}@postgres:5432/modelionn
    depends_on:
      postgres:
        condition: service_healthy
