# Production Docker Compose — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zkml
      POSTGRES_USER: zkml
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zkml"]
      interval: 10s
      timeout: 5s
      retries: 5

  registry:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    environment:
      ZKML_DEBUG: "false"
      ZKML_SECRET_KEY: ${ZKML_SECRET_KEY:?Set ZKML_SECRET_KEY}
      ZKML_DATABASE_URL: postgresql+asyncpg://zkml:${POSTGRES_PASSWORD}@postgres:5432/zkml
      ZKML_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ZKML_CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      ZKML_CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      ZKML_REQUIRE_SIGNATURE_VERIFICATION: "true"
      ZKML_CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.com}
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8000/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ipfs:
        condition: service_started

  worker:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2G
    environment:
      ZKML_DATABASE_URL: postgresql+asyncpg://zkml:${POSTGRES_PASSWORD}@postgres:5432/zkml
      ZKML_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ZKML_CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      ZKML_CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    healthcheck:
      test: ["CMD-SHELL", "celery -A registry.tasks inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  beat:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    environment:
      ZKML_DATABASE_URL: postgresql+asyncpg://zkml:${POSTGRES_PASSWORD}@postgres:5432/zkml
      ZKML_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ZKML_CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      ZKML_CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[c]elery.*beat' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a ${REDIS_PASSWORD:?Set REDIS_PASSWORD} ping | grep -q PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  ipfs:
    restart: unless-stopped
    # In production, only expose swarm port — API stays internal
    ports: !override
      - "4001:4001"
    healthcheck:
      test: ["CMD-SHELL", "ipfs id || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3

  web:
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.your-domain.com}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://your-domain.com}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET}

  flower:
    restart: unless-stopped
    environment:
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:?Set FLOWER_PASSWORD}
    # In production, expose via reverse proxy only — no direct port mapping
    ports: !reset []

  prometheus:
    restart: unless-stopped
    ports: !reset []
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:9090/-/healthy || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 3

  alertmanager:
    restart: unless-stopped
    # In production, expose via reverse proxy only
    ports: !reset []
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:9093/-/healthy || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 3

  backup:
    image: docker:24-cli
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - backup_data:/backups
    environment:
      COMPOSE_FILE: /docker-compose.prod.yml
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Backup cron starting — daily at 02:00 UTC"
        while true; do
          # Sleep until next 02:00 UTC
          now=$$(date +%s)
          target=$$(date -d "tomorrow 02:00" +%s 2>/dev/null || date -v+1d -v2H -v0M -v0S +%s)
          sleep_s=$$((target - now))
          [ "$$sleep_s" -le 0 ] && sleep_s=86400
          echo "Next backup in $$sleep_s seconds"
          sleep "$$sleep_s"
          echo "==> Running scheduled backup $$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          /bin/sh /scripts/backup.sh /backups || echo "Backup failed with exit code $$?"
        done
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "find /backups -name 'pg_*.dump' -mmin -1500 | grep -q . || exit 1",
        ]
      interval: 60s
      timeout: 10s
      retries: 1
      start_period: 86400s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  grafana:
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:3000/api/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pg_data:
  backup_data:
