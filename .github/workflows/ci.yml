name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONHASHSEED: "0"

jobs:
  release-integrity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate release integrity metadata
        run: python scripts/check_release_integrity.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy registry subnet sdk cli --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=registry --cov=sdk --cov=cli --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Verify determinism checks
        run: |
          # Run subset of checks that don't need Docker/IPFS
          python3 -c "import sys; assert sys.version_info >= (3, 10)"
          python3 -c "import numpy; import fastapi; import sqlalchemy; import pydantic"
          echo "Basic determinism checks passed"

      - name: Alembic migration check
        run: alembic check

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          pip install -e ".[dev]"

      - name: SAST scan (Bandit)
        run: bandit -r registry/ sdk/ cli/ subnet/ -c pyproject.toml --severity-level medium -f json -o bandit-report.json || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Bandit check (fail on high severity)
        run: bandit -r registry/ sdk/ cli/ subnet/ --severity-level high

      - name: Dependency audit (pip-audit)
        run: pip-audit --strict --desc

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build --wait
        timeout-minutes: 5

      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost:8000/health | grep '"status":"ok"'

      - name: Readiness check
        run: curl -sf http://localhost:8000/health/ready | grep '"status"'

      - name: Metrics endpoint
        run: curl -sf http://localhost:8000/metrics | head -20

      - name: Stop services
        if: always()
        run: docker compose down -v
  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start services
        run: docker compose up -d --build --wait
        timeout-minutes: 5

      - name: Run benchmark with latency gate
        run: |
          python scripts/benchmark_proof_pipeline.py \
            --format json \
            --max-p95-s 30.0 \
            --output /tmp/benchmark.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: /tmp/benchmark.json

      - name: Stop services
        if: always()
        run: docker compose down -v

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prover

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            prover/target
          key: cargo-${{ runner.os }}-${{ hashFiles('prover/Cargo.lock', 'prover/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Check compilation
        run: cargo check --all-features

      - name: Lint (clippy)
        run: cargo clippy --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --all-features

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Supply-chain audit
        run: cargo audit

  load-smoke:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start services
        run: docker compose up -d --build --wait
        timeout-minutes: 5

      - name: Smoke load test (10 concurrent users, 30s)
        run: |
          python -c "
          import asyncio, httpx, time, sys

          async def run():
              async with httpx.AsyncClient(base_url='http://localhost:8000') as c:
                  results = []
                  async def hit():
                      t0 = time.monotonic()
                      r = await c.get('/health')
                      elapsed = time.monotonic() - t0
                      results.append((r.status_code, elapsed))

                  end = time.monotonic() + 30
                  while time.monotonic() < end:
                      await asyncio.gather(*(hit() for _ in range(10)))
                      await asyncio.sleep(0.1)

                  ok = sum(1 for s,_ in results if s == 200)
                  total = len(results)
                  times = sorted(e for _,e in results)
                  p95 = times[int(len(times)*0.95)] if times else 0
                  print(f'Requests: {total}, OK: {ok}, Errors: {total-ok}, P95: {p95:.3f}s')
                  if ok / total < 0.99:
                      print(f'FAIL: success rate {ok/total:.1%} < 99%')
                      sys.exit(1)
                  if p95 > 1.0:
                      print(f'FAIL: P95 {p95:.3f}s > 1.0s')
                      sys.exit(1)
                  print('PASS')

          asyncio.run(run())
          "

      - name: Stop services
        if: always()
        run: docker compose down -v

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test (Jest)
        run: npm test -- --runInBand

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-build-secret
